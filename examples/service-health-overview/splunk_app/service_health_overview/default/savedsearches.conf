[Service Health Overview - Services By State]
search = index=main sourcetype=service_health earliest=-15m@m latest=now | stats count by state
dispatch.earliest_time = -15m@m
dispatch.latest_time = now

[Service Health Overview - Alerts By Team]
search = index=main sourcetype=service_alerts earliest=-60m@m latest=now | stats count by team
dispatch.earliest_time = -60m@m
dispatch.latest_time = now

[Service Health Overview - Services Needing Attention]
search = index=main sourcetype=service_health earliest=-15m@m latest=now | search state!="healthy" | table service team state owner
dispatch.earliest_time = -15m@m
dispatch.latest_time = now